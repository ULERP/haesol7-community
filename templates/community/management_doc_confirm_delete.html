{% extends 'base_3panel.html' %}
{% block menu_docs %}active{% endblock %}
{% block title %}문서 삭제 확인{% endblock %}
{% block panel_content %}
  <div class="card shadow-sm border-danger">
    <div class="card-body text-center p-4">
      <i class="fas fa-exclamation-triangle fa-3x text-danger mb-3 d-block"></i>
      <h5 class="fw-bold">문서를 삭제하시겠습니까?</h5>
      <p class="text-muted">「{{ object.title }}」 문서가 영구 삭제됩니다.</p>
      <form method="post" class="d-flex gap-2 justify-content-center mt-3">
        {% csrf_token %}
        <a href="{% url 'community:management_doc_list' %}" class="btn btn-outline-secondary">취소</a>
        <button type="submit" class="btn btn-danger">삭제 확인</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
