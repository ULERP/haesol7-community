{% extends 'base.html' %}
{% block title %}로그인{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm border-0">
        <div class="card-header bg-success text-white text-center py-3">
          <h5 class="mb-0 fw-bold"><i class="fas fa-shield-alt me-2"></i>해솔7지킴이 로그인</h5>
        </div>
        <div class="card-body p-4">
          {% if messages %}
          {% for message in messages %}
          <div class="alert alert-danger">{{ message }}</div>
          {% endfor %}
          {% endif %}
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-semibold">아이디</label>
              <input type="text" name="username" class="form-control" placeholder="아이디를 입력하세요" required autofocus>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">비밀번호</label>
              <input type="password" name="password" class="form-control" placeholder="비밀번호를 입력하세요" required>
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-success btn-lg fw-bold">로그인</button>
            </div>
          </form>
          <hr>
          <div class="text-center">
            <span class="text-muted small">아직 회원이 아니신가요?</span>
            <a href="/accounts/signup/" class="text-success fw-semibold ms-2">회원가입</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
