<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>해솔7 지킴이</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-success" href="/">해솔7 지킴이</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">홈</a></li>
                    <li class="nav-item"><a class="nav-link" href="/boards/">전체 게시판</a></li>
                    <li class="nav-item"><a class="nav-link" href="/volunteer/">봉사 달력</a></li>
                    <li class="nav-item"><a class="nav-link" href="/chatbot/"><i class="fas fa-robot me-1"></i>AI 안내</a></li>
                    <li class="nav-item">
                      <form class="d-flex" method="get" action="/search/">
                        <input class="form-control form-control-sm me-1" type="text" name="q" placeholder="검색...">
                        <button class="btn btn-outline-light btn-sm" type="submit"><i class="fas fa-search"></i></button>
                      </form>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="/volunteer/">봉사 달력</a></li>
                    <li class="nav-item"><a class="nav-link" href="/chatbot/"><i class="fas fa-robot me-1"></i>AI 안내</a></li>
                </ul>
                <ul class="navbar-nav">
                    {% if user.is_authenticated %}
              <a href="/notifications/" class="text-white me-2 position-relative">
                <i class="fas fa-bell"></i>
                <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="noti-count" style="font-size:0.6rem;display:none">0</span>
              </a>
                        {% if user.is_staff %}
                            <li class="nav-item"><a class="nav-link" href="/admin/">⚙️ 관리</a></li>
                        {% endif %}
                        <li class="nav-item"><a class="nav-link fw-bold" href="/mypage/">{{ user.username }}님</a></li>
                    {% else %}
                        <li class="nav-item"><a class="nav-link" href="/login/">로그인</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
