{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-success mt-3">
            <div class="card-header bg-success text-white fw-bold">
                <i class="fas fa-edit me-2"></i>{{ title }}
            </div>
            <div class="card-body p-4">
                <form method="POST" action=".">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label for="activity" class="form-label fw-bold text-secondary">
                            <i class="fas fa-tasks me-1 text-success"></i> 1. 참여한 지킴이 활동 선택
                        </label>
                        <select class="form-select form-select-lg" id="activity" name="activity" required>
                            <option value="">-- 활동 항목을 선택해주세요 --</option>
                            {% for act in activities %}
                                <option value="{{ act.id }}">{{ act.name }} (시간당 {{ act.points_per_hour }}p)</option>
                            {% empty %}
                                <option value="" disabled>현재 선택 가능한 활성화 활동이 없습니다.</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-4">
                        <label for="duration" class="form-label fw-bold text-secondary">
                            <i class="fas fa-clock me-1 text-success"></i> 2. 봉사 및 활동 시간
                        </label>
                        <input type="number" class="form-control" id="duration" name="duration_hours" min="1" max="24" value="1" required>
                        <div class="form-text">해당 활동에 참여하신 시간을 시간 단위(숫자만)로 입력해주세요.</div>
                    </div>

                    <div class="mb-4">
                        <label for="description" class="form-label fw-bold text-secondary">
                            <i class="fas fa-comment-alt me-1 text-success"></i> 3. 활동 인증 내용
                        </label>
                        <textarea class="form-control" id="description" name="description" rows="5" placeholder="해솔7 단지 활성화와 안전을 위해 어떤 활동을 하셨는지 상세히 적어주세요." required></textarea>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end border-top pt-3">
                        <a href="/" class="btn btn-outline-secondary me-md-2 px-4">취소</a>
                        <button type="submit" class="btn btn-success px-4 fw-bold">지킴이 활동 등록하기</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
