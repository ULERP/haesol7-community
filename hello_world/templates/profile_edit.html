{% extends 'base.html' %}
{% block title %}프로필 수정{% endblock %}
{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
      <div class="card shadow-sm border-0">
        <div class="card-header bg-success text-white py-3">
          <h5 class="mb-0 fw-bold"><i class="fas fa-user-edit me-2"></i>프로필 수정</h5>
        </div>
        <div class="card-body p-4">
          {% if messages %}{% for message in messages %}
          <div class="alert alert-success">{{ message }}</div>
          {% endfor %}{% endif %}
          <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="text-center mb-4">
              {% if user.profile_image %}
              <img src="{{ user.profile_image.url }}" class="rounded-circle mb-2" style="width:80px;height:80px;object-fit:cover">
              {% else %}
              <div class="bg-success text-white rounded-circle d-flex align-items-center justify-content-center mx-auto mb-2" style="width:80px;height:80px;font-size:2rem">
                <i class="fas fa-user"></i>
              </div>
              {% endif %}
              <input type="file" name="profile_image" class="form-control form-control-sm mt-2" accept="image/*">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">이름</label>
              <input type="text" name="first_name" class="form-control" value="{{ user.first_name }}">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">동호수</label>
              <input type="text" name="unit_number" class="form-control" value="{{ user.unit_number }}" placeholder="예: 101동 1234호">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">연락처</label>
              <input type="text" name="phone_number" class="form-control" value="{{ user.phone_number }}" placeholder="010-0000-0000">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">자기소개</label>
              <textarea name="introduction" class="form-control" rows="4" placeholder="간단한 자기소개를 입력하세요.">{{ user.introduction }}</textarea>
            </div>
            <div class="d-flex justify-content-between mt-4 pt-3 border-top">
              <a href="{% url 'mypage' %}" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-1"></i>취소
              </a>
              <button type="submit" class="btn btn-success px-4">
                <i class="fas fa-save me-1"></i>저장하기
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
