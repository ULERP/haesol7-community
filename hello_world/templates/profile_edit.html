{% extends 'base_3panel.html' %}
{% block title %}프로필 수정{% endblock %}
{% block panel_content %}
  <div class="row justify-content-center">
    <div class="col-12 col-md-7 col-lg-5">
      <div class="card shadow-sm border-0">
        <div class="card-header bg-success text-white py-3">
          <h5 class="mb-0 fw-bold"><i class="fas fa-user-edit me-2"></i>프로필 수정</h5>
        </div>
        <div class="card-body p-4">
          {% if messages %}{% for message in messages %}
          <div class="alert alert-success">{{ message }}</div>
          {% endfor %}{% endif %}
          <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- 프로필 이미지 -->
            <div class="text-center mb-4">
              <div style="width:80px;height:80px;border-radius:50%;background:#1a7a4a;color:#fff;display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 12px;">
                <i class="fas fa-user"></i>
              </div>
              <input type="file" name="profile_image" class="form-control form-control-sm" accept="image/*" style="max-width:300px;margin:0 auto;">
            </div>

            <!-- 닉네임 + 이름 -->
            <div class="row g-3 mb-3">
              <div class="col-6">
                <label class="form-label fw-semibold small">닉네임</label>
                <input type="text" name="nickname" class="form-control form-control-sm"
                  value="{{ user.nickname }}" placeholder="표시될 닉네임">
                <div class="form-text" style="font-size:0.7rem;">없으면 아이디 사용</div>
              </div>
              <div class="col-6">
                <label class="form-label fw-semibold small">이름 <span class="text-muted fw-normal">(선택)</span></label>
                <input type="text" name="first_name" class="form-control form-control-sm"
                  value="{{ user.first_name }}" placeholder="실명">
              </div>
            </div>

            <!-- 동호수 -->
            <div class="row g-3 mb-3">
              <div class="col-6">
                <label class="form-label fw-semibold small">동</label>
                <div class="input-group input-group-sm">
                  <input type="number" name="dong" class="form-control"
                    value="{{ user.dong }}" placeholder="101" min="1" max="999">
                  <span class="input-group-text">동</span>
                </div>
              </div>
              <div class="col-6">
                <label class="form-label fw-semibold small">호</label>
                <div class="input-group input-group-sm">
                  <input type="number" name="ho" class="form-control"
                    value="{{ user.ho }}" placeholder="1234" min="1" max="9999">
                  <span class="input-group-text">호</span>
                </div>
              </div>
            </div>

            <!-- 연락처 -->
            <div class="mb-3">
              <label class="form-label fw-semibold small">연락처</label>
              <input type="tel" name="phone_number" class="form-control form-control-sm"
                value="{{ user.phone_number }}" placeholder="010-0000-0000">
            </div>

            <!-- 자기소개 -->
            <div class="mb-4">
              <label class="form-label fw-semibold small">자기소개</label>
              <textarea name="introduction" class="form-control form-control-sm" rows="3"
                placeholder="간단한 자기소개를 입력하세요.">{{ user.introduction }}</textarea>
            </div>

            <!-- 버튼 -->
            <div class="d-flex justify-content-between pt-3 border-top">
              <a href="/mypage/" class="btn btn-outline-secondary btn-sm px-3">
                <i class="fas fa-arrow-left me-1"></i>취소
              </a>
              <button type="submit" class="btn btn-success btn-sm px-4">
                <i class="fas fa-save me-1"></i>저장하기
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
