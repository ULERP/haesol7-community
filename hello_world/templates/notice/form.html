{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
<div class="col-lg-6">
<h4 class="fw-bold mb-4"><i class="bi bi-bell me-2 text-success"></i>공지 등록</h4>
<div class="card shadow-sm">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold">공지 유형</label>
        <select name="notice_type" class="form-select">
          <option value="">-- 유형 선택 --</option>
          {% for t in types %}
          <option value="{{ t.pk }}">{{ t.name }}</option>
          {% endfor %}
        </select>
        <div class="form-text"><a href="/admin/core/noticecategory/" target="_blank">유형 추가/관리 →</a></div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">제목</label>
        <input type="text" name="title" class="form-control" required maxlength="100">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">내용</label>
        <textarea name="content" class="form-control" rows="5" required></textarea>
      </div>
      <div class="mb-3 form-check">
        <input type="checkbox" name="is_pinned" id="isPinned" class="form-check-input">
        <label for="isPinned" class="form-check-label">상단 고정</label>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-success"><i class="bi bi-bell me-1"></i>등록</button>
        <a href="{% url 'notice_list' %}" class="btn btn-outline-secondary">취소</a>
      </div>
    </form>
  </div>
</div>
</div>
</div>
{% endblock %}
