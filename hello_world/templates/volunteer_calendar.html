{% extends 'base.html' %}
{% block title %}봉사활동 달력{% endblock %}
{% block content %}
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0"><i class="fas fa-calendar-alt text-success me-2"></i>봉사활동 일정</h4>
    {% if user.is_staff %}
    <a href="/admin/core/meetup/add/" class="btn btn-success btn-sm">
      <i class="fas fa-plus me-1"></i>일정 추가
    </a>
    {% endif %}
  </div>
  <div class="card shadow-sm border-0">
    <div class="card-body p-3">
      <div id="calendar"></div>
    </div>
  </div>
</div>
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var events = {{ events_json|safe }};
  var calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
    initialView: 'dayGridMonth',
    locale: 'ko',
    headerToolbar: {left: 'prev,next today', center: 'title', right: 'dayGridMonth,listWeek'},
    events: events,
    eventColor: '#198754',
    eventClick: function(info) {
      if(info.event.url){ window.location.href = info.event.url; info.jsEvent.preventDefault(); }
    },
    height: 'auto',
  });
  calendar.render();
});
</script>
{% endblock %}
