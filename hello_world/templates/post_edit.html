{% extends 'base_3panel.html' %}
{% block menu_boards %}active{% endblock %}
{% block title %}게시글 수정{% endblock %}
{% block panel_content %}
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow-sm border-0">
        <div class="card-header bg-warning text-dark py-3">
          <h5 class="mb-0 fw-bold">
            <i class="fas fa-edit me-2"></i>게시글 수정 — {{ board.name }}
          </h5>
        </div>
        <div class="card-body p-4">
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-semibold">말머리</label>
              {{ post_form.tag }}
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">제목 <span class="text-danger">*</span></label>
              {{ post_form.title }}
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">내용 <span class="text-danger">*</span></label>
              {{ post_form.content }}
            </div>
            <div class="form-check mt-3">
              {{ post_form.is_anonymous }}
              <label class="form-check-label">익명으로 작성</label>
            </div>
            <div class="d-flex justify-content-between mt-4 pt-3 border-top">
              <a href="{% url 'post_detail' post.pk %}" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-1"></i>취소
              </a>
              <button type="submit" class="btn btn-warning px-4">
                <i class="fas fa-save me-1"></i>수정 완료
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
