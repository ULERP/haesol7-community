{% extends 'base.html' %}
{% block title %}글쓰기 — {{ group.name }}{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:680px;">
  <div class="d-flex align-items-center gap-3 mb-4">
    <a href="/groups/{{ group.pk }}/" class="btn btn-outline-secondary btn-sm"><i class="fas fa-arrow-left"></i></a>
    <h5 class="fw-bold mb-0">{{ group.name }} — 글쓰기</h5>
  </div>
  <div class="card border-0 shadow-sm">
    <div class="card-body p-4">
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">제목 <span class="text-danger">*</span></label>
          <input type="text" name="title" class="form-control" placeholder="제목을 입력하세요" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">내용 <span class="text-danger">*</span></label>
          <textarea name="content" class="form-control" rows="8" placeholder="내용을 입력하세요" required></textarea>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">이미지 첨부 <span class="text-muted small fw-normal">(선택)</span></label>
          <input type="file" name="image" class="form-control" accept="image/*">
        </div>
        <div class="d-flex justify-content-between">
          <a href="/groups/{{ group.pk }}/" class="btn btn-outline-secondary">취소</a>
          <button type="submit" class="btn btn-success px-4"><i class="fas fa-pen me-1"></i>등록하기</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
