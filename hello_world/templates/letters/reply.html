{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
<div class="col-lg-7">

<h4 class="fw-bold mb-4"><i class="bi bi-reply me-2 text-success"></i>답장</h4>

<div class="alert alert-light border-start border-4 border-success small mb-3">
  <strong>원본:</strong> {{ original.subject }}<br>
  <span class="text-muted">{{ original.sender.nickname }} · {{ original.created_at|date:"m/d H:i" }}</span>
  <div class="mt-1" style="white-space:pre-wrap;">{{ original.content|truncatechars:200 }}</div>
</div>

<div class="card shadow-sm">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="parent_id" value="{{ original.pk }}">
      <div class="mb-2 small text-muted">
        <i class="bi bi-person-check me-1"></i>받는 사람: <strong>{{ original.sender.nickname }}</strong>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">답장 내용</label>
        <textarea name="content" class="form-control" rows="5" required placeholder="답장 내용을 입력하세요"></textarea>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-success"><i class="bi bi-send me-1"></i>답장 보내기</button>
        <a href="{% url 'letter_inbox' %}" class="btn btn-outline-secondary">취소</a>
      </div>
    </form>
  </div>
</div>

</div>
</div>
{% endblock %}
