{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
<div class="col-lg-7">

<h4 class="fw-bold mb-4"><i class="bi bi-pencil-square me-2 text-success"></i>쪽지 쓰기</h4>

<div class="card shadow-sm">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold">받는 사람</label>
        {% if receiver %}
          <input type="hidden" name="receiver_id" value="{{ receiver.pk }}">
          <input type="text" class="form-control" value="{{ receiver.nickname }} ({{ receiver.dong }}동 {{ receiver.ho }}호)" readonly>
        {% else %}
          <input type="text" id="userSearch" class="form-control mb-1" placeholder="닉네임 또는 아이디로 검색..." autocomplete="off">
          <select name="receiver_id" id="receiverSelect" class="form-select" required size="4" style="height:auto;">
            <option value="">-- 이웃을 선택하세요 --</option>
            {% for u in users %}
            <option value="{{ u.pk }}" data-label="{{ u.nickname }} {{ u.username }}">
              {{ u.nickname }} ({{ u.dong }}동)
            </option>
            {% endfor %}
          </select>
        {% endif %}
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">제목</label>
        <input type="text" name="subject" class="form-control" required maxlength="100" placeholder="쪽지 제목">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">내용</label>
        <textarea name="content" class="form-control" rows="6" required placeholder="쪽지 내용을 입력하세요"></textarea>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-success"><i class="bi bi-send me-1"></i>보내기</button>
        <a href="{% url 'letter_inbox' %}" class="btn btn-outline-secondary">취소</a>
      </div>
    </form>
  </div>
</div>

</div>
</div>
{% block extra_js %}
<script>
const search = document.getElementById('userSearch');
const select = document.getElementById('receiverSelect');
if (search && select) {
  const opts = Array.from(select.options);
  search.addEventListener('input', function() {
    const q = this.value.toLowerCase();
    select.innerHTML = '';
    opts.forEach(opt => {
      if (!q || opt.dataset.label && opt.dataset.label.toLowerCase().includes(q) || opt.value === '') {
        select.appendChild(opt.cloneNode(true));
      }
    });
  });
}
</script>
{% endblock %}
{% endblock %}
