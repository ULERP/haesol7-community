<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>게시판 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">해솔7 게시판</a>
    </div>
</nav>
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3">게시판 목록</h1>
        <a href="/posts/" class="btn btn-outline-secondary">새로 고침</a>
    </div>

    {% if posts %}
        <div class="list-group">
            {% for post in posts %}
                <a href="{% url 'post_detail' pk=post.pk %}" class="list-group-item list-group-item-action">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h5 class="mb-1">{{ post.title }}</h5>
                            <p class="mb-1 text-muted">
                                작성자: {% if post.author %}{{ post.author.username }}{% else %}익명{% endif %}
                            </p>
                        </div>
                        <small class="text-muted">{{ post.created_at|date:'Y.m.d H:i' }}</small>
                    </div>
                </a>
            {% endfor %}
        </div>
    {% else %}
        <div class="alert alert-info">등록된 게시글이 없습니다.</div>
    {% endif %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
